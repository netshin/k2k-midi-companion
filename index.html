<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<title>K2600 Patch Display</title>

<link rel="stylesheet" href="css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="js/config.js" defer></script>

<script src="https://cdn.jsdelivr.net/npm/webmidi@latest/dist/iife/webmidi.iife.js" defer></script>

<script src="js/app.js" defer></script>

</head>

<body>


<!-- DEVICE SELECTION MODAL -->
 <!-- ROM ADD-ON SELECTION MODAL -->


<div id="deviceModal" class="modal">
  <div class="modal-content">
    <h2>Select MIDI Interface</h2>
    <div id="deviceTiles"></div>

    <h2>Installed ROM Cards</h2>
    <div id="romTiles"></div>

    <div class="modal-actions">

  <button class="k2600-button cancelButton">
    CANCEL
  </button>

  <button class="k2600-button okButton">
    OK
  </button>

</div>

  </div>
</div>







<!-- SETTINGS BUTTON -->

<div id="settingsButton" class="settingsButton k2600-button">
Config
<!--  <span class="gear">⚙</span> -->
</div>



<!-- MAIN SYNTH UI -->

<div class="rack">

  <div class="panel">

    <div class="lcd-frame">
      <div id="display">Waiting...</div>
    </div>

    <div class="notes-frame">
      <div id="notes" class="ctrl-desc">
        Select a patch to see description...
      </div>
    </div>

  </div>

</div>


<!-- PANEL SCREWS -->

<div class="screw tl"></div>
<div class="screw tr"></div>
<div class="screw bl"></div>
<div class="screw br"></div>


</body>

</html>
